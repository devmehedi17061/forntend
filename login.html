<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Smart HR Management Solution</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body class="login-page">

    <div class="login-card" data-aos="zoom-in">
        <div class="text-center mb-5">
            <a href="index.html" class="navbar-brand fw-bold text-white mb-4 d-inline-block" style="font-size: 2rem;">
                <span style="color: var(--accent);">NMC</span> HR
            </a>
            <h4 class="fw-bold text-white">Welcome Back</h4>
            <p class="small opacity-75">Enter your credentials to access your dashboard</p>
        </div>

        <form>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"
                        style="border: 1px solid rgba(255, 255, 255, 0.1);">
                        <i class="bi bi-envelope text-white opacity-50"></i>
                    </span>
                    <input type="email" class="form-control border-start-0" placeholder="name@company.com">
                </div>
            </div>
            <div class="mb-3">
                <div class="d-flex justify-content-between">
                    <label class="form-label">Password</label>
                    <a href="#" class="small text-accent text-decoration-none">Forgot?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"
                        style="border: 1px solid rgba(255, 255, 255, 0.1);">
                        <i class="bi bi-shield-lock text-white opacity-50"></i>
                    </span>
                    <input type="password" class="form-control border-start-0" placeholder="••••••••">
                </div>
            </div>
            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label small opacity-75" for="rememberMe">Remember this browser</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-lg mb-4">Login to Dashboard</button>

            <div class="position-relative mb-4">
                <hr class="opacity-10">
                <span class="position-absolute top-50 start-50 translate-middle bg-dark px-2 small opacity-50">OR</span>
            </div>

            <div class="d-grid gap-2">
                <button class="btn social-login-btn py-2 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-google"></i> Continue with Google
                </button>
            </div>

            <p class="text-center mt-5 mb-0 small opacity-75">
                Don't have an account? <a href="contact.html" class="text-accent text-decoration-none fw-bold">Contact
                    Sales</a>
            </p>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });
    </script>
</body>

</html>
